<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link id="theme-css" rel="stylesheet" href="preview-light.css">
    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="katex/katex.min.css">
    <!-- highlight.js CSS -->
    <link id="hljs-css" rel="stylesheet" href="highlight/github.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 24px;
        }
        /* Mermaid diagram containers */
        .mermaid-container {
            text-align: center;
            margin: 1em 0;
        }
        .mermaid-container svg {
            max-width: 100%;
        }
    </style>
</head>
<body>
    <div id="content"></div>

    <!-- KaTeX JS -->
    <script src="katex/katex.min.js"></script>
    <script src="katex/auto-render.min.js"></script>
    <!-- highlight.js -->
    <script src="highlight/highlight.min.js"></script>
    <!-- Mermaid.js -->
    <script src="mermaid/mermaid.min.js"></script>

    <script>
        // Initialize mermaid with auto-start disabled so we control when it runs
        mermaid.initialize({ startOnLoad: false, theme: 'default' });

        function updateContent(html) {
            var el = document.getElementById('content');
            el.textContent = '';
            var temp = document.createElement('div');
            temp.innerHTML = html;
            while (temp.firstChild) {
                el.appendChild(temp.firstChild);
            }
            renderExtensions();
        }

        function renderExtensions() {
            var content = document.getElementById('content');

            // 1. KaTeX math rendering.
            //    Display math ($$...$$, \[...\]) and LaTeX-style inline (\(...\))
            //    go through auto-render. Single-$ inline is handled separately
            //    with a prose guard so dollar amounts ($5, $10) are NOT eaten.
            try {
                renderMathInElement(content, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '\\(', right: '\\)', display: false },
                        { left: '\\[', right: '\\]', display: true }
                    ],
                    throwOnError: false
                });
            } catch (e) {
                console.warn('KaTeX rendering error:', e);
            }
            try {
                renderGuardedInlineMath(content);
            } catch (e) {
                console.warn('Inline math rendering error:', e);
            }

            // 2. highlight.js: syntax-highlight all code blocks
            try {
                var codeBlocks = document.querySelectorAll('#content pre code');
                codeBlocks.forEach(function(block) {
                    // Skip mermaid blocks
                    if (!block.classList.contains('language-mermaid')) {
                        hljs.highlightElement(block);
                    }
                });
            } catch (e) {
                console.warn('highlight.js rendering error:', e);
            }

            // 3. Mermaid: render mermaid code blocks
            try {
                var mermaidBlocks = document.querySelectorAll('#content code.language-mermaid');
                mermaidBlocks.forEach(function(codeEl) {
                    var pre = codeEl.parentElement;
                    if (pre && pre.tagName === 'PRE') {
                        var container = document.createElement('div');
                        container.className = 'mermaid-container';
                        var mermaidDiv = document.createElement('div');
                        mermaidDiv.className = 'mermaid';
                        mermaidDiv.textContent = codeEl.textContent;
                        container.appendChild(mermaidDiv);
                        pre.parentNode.replaceChild(container, pre);
                    }
                });
                // Run mermaid on all .mermaid elements
                mermaid.run({ querySelector: '.mermaid' }).catch(function(e) {
                    console.warn('Mermaid rendering error:', e);
                });
            } catch (e) {
                console.warn('Mermaid rendering error:', e);
            }
        }

        // Render single-$ inline math, but only when a $...$ span looks like
        // math rather than prose containing dollar amounts. A $ starts math
        // only when the next char is non-space and non-digit; the closing $
        // must be preceded by a non-space char. So "$5 and $10" stays literal
        // while "$x^2 + y^2$" renders. Code/pre/script/style and already
        // rendered .katex spans are skipped.
        function renderGuardedInlineMath(root) {
            var INLINE = /\$(?=\S)(?!\d)((?:[^$\\\n]|\\.)*?[^\s$])\$/g;
            var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
                acceptNode: function (node) {
                    if (!node.nodeValue || node.nodeValue.indexOf('$') === -1) {
                        return NodeFilter.FILTER_REJECT;
                    }
                    for (var p = node.parentNode; p && p !== root; p = p.parentNode) {
                        var tag = p.tagName;
                        if (tag === 'CODE' || tag === 'PRE' || tag === 'SCRIPT' || tag === 'STYLE') {
                            return NodeFilter.FILTER_REJECT;
                        }
                        if (p.classList && p.classList.contains('katex')) {
                            return NodeFilter.FILTER_REJECT;
                        }
                    }
                    return NodeFilter.FILTER_ACCEPT;
                }
            });
            var targets = [];
            var n;
            while ((n = walker.nextNode())) { targets.push(n); }

            targets.forEach(function (textNode) {
                var text = textNode.nodeValue;
                INLINE.lastIndex = 0;
                var m = INLINE.exec(text);
                if (m === null) { return; }

                var frag = document.createDocumentFragment();
                var last = 0;
                do {
                    if (m.index > last) {
                        frag.appendChild(document.createTextNode(text.slice(last, m.index)));
                    }
                    var span = document.createElement('span');
                    try {
                        katex.render(m[1], span, { throwOnError: false, displayMode: false });
                    } catch (e) {
                        span.textContent = m[0];
                    }
                    frag.appendChild(span);
                    last = m.index + m[0].length;
                } while ((m = INLINE.exec(text)) !== null);
                if (last < text.length) {
                    frag.appendChild(document.createTextNode(text.slice(last)));
                }
                textNode.parentNode.replaceChild(frag, textNode);
            });
        }

        function setTheme(theme) {
            document.getElementById('theme-css').href = theme + '.css';
            // Switch highlight.js theme based on light/dark
            if (theme.indexOf('dark') !== -1) {
                document.getElementById('hljs-css').href = 'highlight/github-dark.min.css';
            } else {
                document.getElementById('hljs-css').href = 'highlight/github.min.css';
            }
        }
    </script>
</body>
</html>
